<html lang="en">

    <title>Water Supply</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="container">

        <h1>💧 Water Supply</h1>

        <div class="card">
            <h2>Today's Water Supply Time</h2>
            <p><strong>Morning:</strong> 6:00 AM - 8:00 AM</p>
            <p><strong>Evening:</strong> 5:00 PM - 7:00 PM</p>
        </div>

        <div class="card">
            <h2>Water Tank Status</h2>
            <p>Current Water Level: <strong>80%</strong></p>
        </div>

        <div class="card">
            <h2>Emergency Contact</h2>
            <p>Village Water Department</p>
            <p>📞 +91 9876543210</p>
        </div>

        <div class="card">
            <h2>Register Water Complaint</h2>
            <a href="complaint.html">
                <button>Register Complaint</button>
            </a>
        </div>

        <br>

        <a href="index.html" class="back-btn">⬅ Back to Home</a>

    </div>

</html>
