<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Maintenance</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header>

        <h1>🌿 Digital Village Management System</h1>

        <nav>
            <a href="/">🏠 Home</a>
            <a href="/dashboard">📊 Dashboard</a>
            <a href="/complaint">📝 Complaint</a>
            <a href="/contact">📞 Contact</a>
        </nav>

    </header>

    <div class="container">

        <h2 style="text-align:center;color:#0d6efd;">
            🛣️ Road Maintenance
        </h2>

        <p style="text-align:center;">
            Report damaged roads, potholes and road maintenance issues.
        </p>

        <form>

            <label>Road Name</label>
            <input type="text" placeholder="Enter Road Name">

            <label>Problem</label>
            <select>
                <option>Potholes</option>
                <option>Road Damage</option>
                <option>Drainage Problem</option>
                <option>Street Light Damage</option>
            </select>

            <label>Description</label>
            <textarea rows="5" placeholder="Enter Problem Details"></textarea>

            <button type="submit">
                Submit Request
            </button>

        </form>

        <br>

        <a href="/dashboard">
            <button>⬅ Back to Dashboard</button>
        </a>

    </div>

</body>

</html>
