<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Road Maintenance</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header>
        <h1>🌿 Digital Village Management System</h1>

        <nav>
            <a href="/">🏠 Home</a>
            <a href="/dashboard">📊 Dashboard</a>
            <a href="/contact">📞 Contact</a>
        </nav>
    </header>

    <div class="container">

        <h2>🛣️ Road Maintenance</h2>

        <form method="POST">

            <label>Your Name</label>
            <input type="text" name="name" placeholder="Enter Your Name" required>

            <label>Mobile Number</label>
            <input type="text" name="mobile" placeholder="Enter Mobile Number" required>

            <label>Area / Road Name</label>
            <input type="text" name="area" placeholder="Enter Road Name" required>

            <label>Issue</label>
            <select name="issue" required>
                <option value="">-- Select Issue --</option>
                <option>Potholes</option>
                <option>Road Damage</option>
                <option>Drainage Problem</option>
                <option>Street Light Damage</option>
            </select>

            <label>Description</label>
            <textarea name="description" rows="5" placeholder="Enter Problem Details" required></textarea>

            <button type="submit">Submit Request</button>

        </form>

        <br>

        <a href="/dashboard">
            <button>⬅ Back to Dashboard</button>
        </a>

    </div>

</body>

</html>
