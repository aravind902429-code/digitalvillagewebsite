<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Digital Village</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header>

        <h1>🌿 Digital Village Management System</h1>

        <nav>
            <a href="/">🏠 Home</a>
            <a href="/about">🏡 About</a>
            <a href="/login">👤 Login</a>
            <a href="/schemes">📜 Schemes</a>
            <a href="/water">💧 Water Supply</a>
            <a href="/electricity">⚡ Electricity</a>
            <a href="/complaint">📝 Complaint</a>
            <a href="/villagenews">📰 Village News</a>
            <a href="/contact">📞 Contact</a>
        </nav>

    </header>

    <div class="container">

        <h2 style="text-align:center;color:#0d6efd;">
            Citizen Registration
        </h2>

        <form method="POST" action="/register">

            <label>Full Name</label>
            <input type="text" name="name" placeholder="Enter Full Name" required>

            <label>Mobile Number</label>
            <input type="tel" name="mobile" placeholder="Enter Mobile Number" required>

            <label>Email</label>
            <input type="email" name="email" placeholder="Enter Email" required>

            <label>Aadhaar Number</label>
            <input type="text" name="aadhaar" placeholder="Enter Aadhaar Number" required>

            <label>Village Name</label>
            <input type="text" name="village" placeholder="Enter Village Name" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Create Password" required>

            <label>Confirm Password</label>
            <input type="password" name="confirm_password" placeholder="Confirm Password" required>

            <button type="submit">Register</button>

        </form>

        <br>

        <p style="text-align:center;">
            Already have an account?
            <a href="/login">Login</a>
        </p>

    </div>

    <footer>
        <p>© 2026 Digital Village Management System</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
