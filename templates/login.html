<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Digital Village</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header>

        <h1>🌿 Digital Village</h1>

        <nav>
            <a href="/">🏠 Home</a>
            <a href="/about">🏡 About</a>
            <a href="/login">👤 Login</a>
            <a href="/schemes">📜 Government Schemes</a>
            <a href="/water">💧 Water Supply</a>
            <a href="/electricity">⚡ Electricity</a>
            <a href="/complaint">📝 Complaint</a>
            <a href="/villagenews">📰 Village News</a>
            <a href="/contact">📞 Contact</a>
        </nav>

    </header>

    <div class="container">

        <h2 style="text-align:center;color:#0d6efd;">Citizen Login</h2>

        <form method="POST" action="/login">

            <label>Mobile Number</label>
            <input type="text" name="mobile" placeholder="Enter Mobile Number" required>

            <label>Password</label>
            <input type="password" name="password" placeholder="Enter Password" required>

            <button type="submit">Login</button>

        </form>

        <br>

        <p style="text-align:center;">
            Don't have an account?
            <a href="/register">Register Here</a>
        </p>

    </div>

    <footer>
        <p>© 2026 Digital Village Management System</p>
    </footer>

    <script src="{{ url_for('static', filename='script.js') }}"></script>

</body>

</html>
