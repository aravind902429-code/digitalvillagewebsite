<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Service</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>

    <header>
        <h1>🌿 Digital Village Management System</h1>

        <nav>
            <a href="/">🏠 Home</a>
            <a href="/dashboard">📊 Dashboard</a>
            <a href="/contact">📞 Contact</a>
        </nav>
    </header>

    <div class="container">

        <h2>⚡ Electricity Service Request</h2>

        <form method="POST">

            <label>Full Name</label>
            <input type="text" name="name" required>

            <label>Mobile Number</label>
            <input type="text" name="mobile" required>

            <label>Area / Street</label>
            <input type="text" name="area" required>

            <label>Issue</label>
            <select name="issue" required>
                <option>Power Failure</option>
                <option>Street Light Not Working</option>
                <option>Low Voltage</option>
                <option>Transformer Problem</option>
            </select>

            <label>Description</label>
            <textarea name="description" rows="5" required></textarea>

            <button type="submit">Submit Request</button>

        </form>

        <br>

        <a href="/dashboard">
            <button>⬅ Back to Dashboard</button>
        </a>

    </div>

</body>

</html>
