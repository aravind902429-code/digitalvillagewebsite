<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Village Login</title>

    <link rel="stylesheet" href="style.css">

    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            background: #f4f8fb;
        }

        .login-container {
            width: 90%;
            max-width: 400px;
            margin: 70px auto;
            background: #fff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
        }

        .login-container h1 {
            text-align: center;
            color: #0d6efd;
            margin-bottom: 25px;
        }

        input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 16px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #0d6efd;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 18px;
            cursor: pointer;
        }

        button:hover {
            background: #084db8;
        }

        .back {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #0d6efd;
            text-decoration: none;
            font-weight: bold;
        }
    </style>

</head>

<body>

    <div class="login-container">

        <h1>Digital Village Login</h1>

        <form id="loginForm">

            <input type="text" placeholder="Username" required>

            <input type="password" placeholder="Password" required>

            <button type="submit">Login</button>

        </form>

        <a href="index.html" class="back">⬅ Back to Home</a>

    </div>

    <script>
        document.getElementById("loginForm").addEventListener("submit", function (e) {
            e.preventDefault();

            alert("Login Successful!");

            window.location.href = "index.html";
        });
    </script>

</body>

</html>
